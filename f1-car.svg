<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three racing cars chasing each other on a track">
  <defs>
    <!-- Fundo e pista -->
    earGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05060A"/>
      <stop offset="0.4" stop-color="#0E1220"/>
      <stop offset="1" stop-color="#020306"/>
    </linearGradient>

    earGradient id="track" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E2430"/>
      <stop offset="1" stop-color="#11151E"/>
    </linearGradient>

    <!-- Cores dos carros (sem texto de marca) -->
    earGradient id="carRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF1B2D"/>
      <stop offset="0.5" stop-color="#C10F22"/>
      <stop offset="1" stop-color="#FF5C5C"/>
    </linearGradient>

    earGradient id="carSilver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F7FB"/>
      <stop offset="0.3" stop-color="#C9D0DA"/>
      <stop offset="0.7" stop-color="#87909C"/>
      <stop offset="1" stop-color="#E4E9F2"/>
    </linearGradient>

    earGradient id="carBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C2CFF"/>
      <stop offset="0.5" stop-color="#081467"/>
      <stop offset="1" stop-color="#FFCC00"/>
    </linearGradient>

    earGradient id="cockpitGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8DEBFF"/>
      <stop offset="1" stop-color="#2E7CF6"/>
    </linearGradient>

    earGradient id="speedLine" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#B8F3FF" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#6AAEFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6AAEFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .carTrain {
        animation: move 9s linear infinite;
      }

      .carFerrari {
        animation-delay: 0s;
      }
      .carMercedes {
        animation-delay: -3s;
      }
      .carBlue {
        animation-delay: -6s;
      }

      .wheelFast, .wheelSlow {
        transform-box: fill-box;
        transform-origin: center;
      }

      .wheelFast {
        animation: spin 0.42s linear infinite;
      }

      .wheelSlow {
        animation: spin 0.64s linear infinite;
      }

      .carFloat {
        animation: float 0.32s ease-in-out infinite alternate;
      }

      .speedTrail {
        animation: trailPulse 0.9s ease-in-out infinite alternate;
      }

      .headLight {
        animation: blink 0.8s ease-in-out infinite alternate;
      }

      @keyframes move {
        0%   { transform: translateX(-420px); }
        100% { transform: translateX(1320px); }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      @keyframes float {
        from { transform: translateY(0px); }
        to   { transform: translateY(-2px); }
      }

      @keyframes trailPulse {
        from { opacity: 0.3; }
        to   { opacity: 1; }
      }

      @keyframes blink {
        from { opacity: 0.4; }
        to   { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .carTrain, .wheelFast, .wheelSlow, .carFloat, .speedTrail, .headLight {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="260" rx="24" fill="url(#bg)"/>

  <!-- Pista -->
  <g transform="translate(0,150)">
    <rect x="0" y="0" width="1200" height="70" fill="url(#track)"/>
    <rect x="0" y="30" width="1200" height="6" fill="#FFFFFF" opacity="0.18"/>

    <!-- Faixa tracejada central -->
    <g stroke="#F8FAFF" stroke-width="5" stroke-linecap="round" opacity="0.75">
      e x1="20"  y1="33" x2="90"  y2="33"/>
      e x1="140" y1="33" x2="210" y2="33"/>
      e x1="260" y1="33" x2="330" y2="33"/>
      e x1="380" y1="33" x2="450" y2="33"/>
      e x1="500" y1="33" x2="570" y2="33"/>
      e x1="620" y1="33" x2="690" y2="33"/>
      e x1="740" y1="33" x2="810" y2="33"/>
      e x1="860" y1="33" x2="930" y2="33"/>
      e x1="980" y1="33" x2="1050" y2="33"/>
      e x1="1100" y1="33" x2="1170" y2="33"/>
    </g>
  </g>

  <!-- Grupo dos três carros -->
  <g filter="url(#glow)">
    <!-- Carro 1 - vermelho, na frente -->
    <g class="carTrain carFerrari" transform="translate(0,0)">
      <g class="speedTrail">
        <path d="M130 188 C 80 186, 40 190, -80 200" stroke="url(#speedLine)" stroke-width="8" stroke-linecap="round"/>
      </g>
      <g class="carFloat" transform="translate(80,130)">
        <!-- sombra -->
        <ellipse cx="140" cy="84" rx="90" ry="9" fill="#000000" opacity="0.35"/>
        <!-- corpo principal -->
        <g transform="translate(40,40)">
          <!-- asa dianteira -->
          <path d="M0 40 L24 32 L46 32 L46 48 L24 48 Z" fill="#D2D5DD"/>
          <!-- bico longo -->
          <path d="M46 36 L88 32 L120 34 L120 45 L80 48 L46 46 Z" fill="url(#carRed)"/>
          <!-- chassi baixo -->
          <path d="M80 32 L178 30 L212 46 L288 46 L300 52 L288 58 L210 58 L178 72 L108 72 L80 60 Z" fill="url(#carRed)"/>
          <!-- cockpit -->
          <path d="M130 30 L164 30 L178 46 L132 46 Z" fill="url(#cockpitGlass)"/>
          <!-- halo / proteção -->
          <rect x="148" y="28" width="10" height="18" rx="4" fill="#161921"/>
          <!-- asa traseira -->
          <path d="M260 32 L302 32 L312 44 L302 56 L260 56 Z" fill="#D2D5DD"/>
          <!-- detalhes laterais -->
          <rect x="112" y="52" width="40" height="6" rx="3" fill="#FFF2C4" opacity="0.9"/>
          <rect x="194" y="40" width="32" height="5" rx="2.5" fill="#FFE08A" opacity="0.9"/>

          <!-- rodas -->
          <g class="wheelFast">
            ircle cx="86" cy="74" r="16" fill="#080B12"/>
            ircle cx="86" cy="74" r="9" fill="#2E3748"/>
            ircle cx="86" cy="74" r="3" fill="#DDE4F5"/>
          </g>
          <g class="wheelSlow">
            ircle cx="238" cy="74" r="16" fill="#080B12"/>
            ircle cx="238" cy="74" r="9" fill="#2E3748"/>
            ircle cx="238" cy="74" r="3" fill="#DDE4F5"/>
          </g>

          <!-- farol / luz dianteira -->
          ircle class="headLight" cx="300" cy="44" r="3.5" fill="#8AF0FF"/>
        </g>
      </g>
    </g>

    <!-- Carro 2 - prateado, no meio -->
    <g class="carTrain carMercedes" transform="translate(0,20)">
      <g class="speedTrail">
        <path d="M130 188 C 80 186, 40 190, -80 200" stroke="url(#speedLine)" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
      </g>
      <g class="carFloat" transform="translate(60,138)">
        <ellipse cx="140" cy="84" rx="90" ry="9" fill="#000000" opacity="0.32"/>
        <g transform="translate(40,40)">
          <path d="M0 40 L24 32 L46 32 L46 48 L24 48 Z" fill="#C4CBD6"/>
          <path d="M46 36 L88 32 L120 34 L120 45 L80 48 L46 46 Z" fill="url(#carSilver)"/>
          <path d="M80 32 L178 30 L212 46 L288 46 L300 52 L288 58 L210 58 L178 72 L108 72 L80 60 Z" fill="url(#carSilver)"/>
          <path d="M130 30 L164 30 L178 46 L132 46 Z" fill="url(#cockpitGlass)"/>
          <rect x="148" y="28" width="10" height="18" rx="4" fill="#10141C"/>
          <path d="M260 32 L302 32 L312 44 L302 56 L260 56 Z" fill="#C4CBD6"/>
          <rect x="112" y="52" width="40" height="6" rx="3" fill="#B8FFEB" opacity="0.9"/>
          <rect x="194" y="40" width="32" height="5" rx="2.5" fill="#72F3C5" opacity="0.9"/>

          <g class="wheelFast">
            ircle cx="86" cy="74" r="16" fill="#05070C"/>
            ircle cx="86" cy="74" r="9" fill="#2A303C"/>
            ircle cx="86" cy="74" r="3" fill="#DDE4F5"/>
          </g>
          <g class="wheelSlow">
            ircle cx="238" cy="74" r="16" fill="#05070C"/>
            ircle cx="238" cy="74" r="9" fill="#2A303C"/>
            ircle cx="238" cy="74" r="3" fill="#DDE4F5"/>
          </g>

          ircle class="headLight" cx="300" cy="44" r="3.5" fill="#8AF0FF"/>
        </g>
      </g>
    </g>

    <!-- Carro 3 - azul/amarelo, atrás -->
    <g class="carTrain carBlue" transform="translate(0,40)">
      <g class="speedTrail">
        <path d="M130 188 C 80 186, 40 190, -80 200" stroke="url(#speedLine)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
      </g>
      <g class="carFloat" transform="translate(40,146)">
        <ellipse cx="140" cy="84" rx="90" ry="9" fill="#000000" opacity="0.3"/>
        <g transform="translate(40,40)">
          <path d="M0 40 L24 32 L46 32 L46 48 L24 48 Z" fill="#202434"/>
          <path d="M46 36 L88 32 L120 34 L120 45 L80 48 L46 46 Z" fill="url(#carBlue)"/>
          <path d="M80 32 L178 30 L212 46 L288 46 L300 52 L288 58 L210 58 L178 72 L108 72 L80 60 Z" fill="url(#carBlue)"/>
          <path d="M130 30 L164 30 L178 46 L132 46 Z" fill="url(#cockpitGlass)"/>
          <rect x="148" y="28" width="10" height="18" rx="4" fill="#11141E"/>
          <path d="M260 32 L302 32 L312 44 L302 56 L260 56 Z" fill="#202434"/>
          <!-- faixa amarela lateral -->
          <rect x="112" y="52" width="40" height="6" rx="3" fill="#FFCC00" opacity="0.95"/>
          <rect x="194" y="40" width="32" height="5" rx="2.5" fill="#FFCC00" opacity="0.95"/>

          <g class="wheelFast">
            ircle cx="86" cy="74" r="16" fill="#070910"/>
            ircle cx="86" cy="74" r="9" fill="#343A4C"/>
            ircle cx="86" cy="74" r="3" fill="#DDE4F5"/>
          </g>
          <g class="wheelSlow">
            ircle cx="238" cy="74" r="16" fill="#070910"/>
            ircle cx="238" cy="74" r="9" fill="#343A4C"/>
            ircle cx="238" cy="74" r="3" fill="#DDE4F5"/>
          </g>

          ircle class="headLight" cx="300" cy="44" r="3.5" fill="#8AF0FF"/>
        </g>
      </g>
    </g>
  </g>
</svg>