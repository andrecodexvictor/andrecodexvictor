<svg width="1200" height="140" viewBox="0 0 1200 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three racing cars on a track">
  <!-- Fundo -->
  <rect width="1200" height="140" fill="#05070C" />

  <!-- Pista -->
  <linearGradient id="trackGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#222733" />
    <stop offset="1" stop-color="#11141D" />
  </linearGradient>
  <g transform="translate(0,60)">
    <rect x="0" y="0" width="1200" height="50" fill="url(#trackGrad)" />
    <rect x="0" y="22" width="1200" height="3" fill="#FFFFFF" opacity="0.15" />
    <g stroke="#F9FAFF" stroke-width="3.5" stroke-linecap="round" opacity="0.8">
      <line x1="20"  y1="25" x2="80"  y2="25" />
      <line x1="130" y1="25" x2="190" y2="25" />
      <line x1="240" y1="25" x2="300" y2="25" />
      <line x1="350" y1="25" x2="410" y2="25" />
      <line x1="460" y1="25" x2="520" y2="25" />
      <line x1="570" y1="25" x2="630" y2="25" />
      <line x1="680" y1="25" x2="740" y2="25" />
      <line x1="790" y1="25" x2="850" y2="25" />
      <line x1="900" y1="25" x2="960" y2="25" />
      <line x1="1010" y1="25" x2="1070" y2="25" />
      <line x1="1120" y1="25" x2="1180" y2="25" />
    </g>
  </g>

  <!-- Gradientes de cor dos carros -->
  <linearGradient id="carRed" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#FF1B2D" />
    <stop offset="0.5" stop-color="#C10F22" />
    <stop offset="1" stop-color="#FF5C5C" />
  </linearGradient>
  <linearGradient id="carSilver" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F4F7FB" />
    <stop offset="0.3" stop-color="#C9D0DA" />
    <stop offset="0.7" stop-color="#87909C" />
    <stop offset="1" stop-color="#E4E9F2" />
  </linearGradient>
  <linearGradient id="carBlue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#1C2CFF" />
    <stop offset="0.5" stop-color="#081467" />
    <stop offset="1" stop-color="#FFCC00" />
  </linearGradient>

  <!-- Carro 1 - vermelho -->
  <g transform="translate(120,10)">
    <ellipse cx="120" cy="80" rx="70" ry="7" fill="#000000" opacity="0.35" />
    <g>
      <!-- asa dianteira -->
      <path d="M10 52 L28 43 L50 43 L50 60 L28 60 Z" fill="#D0D3DB" />
      <!-- bico -->
      <path d="M50 47 L86 41 L112 43 L112 56 L80 60 L50 56 Z" fill="#C0C4CF" />
      <!-- chassi -->
      <path d="M80 41 L160 39 L190 53 L250 53 L260 58 L250 63 L188 63 L160 76 L108 76 L80 65 Z"
            fill="url(#carRed)" />
      <!-- cockpit -->
      <path d="M120 39 L148 39 L160 53 L122 53 Z" fill="#7FD8FF" />
      <!-- halo -->
      <rect x="135" y="37" width="8" height="16" rx="4" fill="#151924" />
      <!-- asa traseira -->
      <path d="M224 41 L258 41 L266 52 L258 63 L224 63 Z" fill="#D0D3DB" />
      <!-- detalhes -->
      <rect x="108" y="61" width="32" height="5" rx="2.5" fill="#F9FAFB" opacity="0.9" />
      <rect x="174" y="50" width="26" height="4" rx="2" fill="#FFE08A" opacity="0.9" />
      <!-- rodas -->
      <g>
        <g>
          <circle cx="92" cy="80" r="13" fill="#05070C" />
          <circle cx="92" cy="80" r="8" fill="#323848" />
          <circle cx="92" cy="80" r="3" fill="#E4E9F5" />
        </g>
        <g>
          <circle cx="208" cy="80" r="13" fill="#05070C" />
          <circle cx="208" cy="80" r="8" fill="#323848" />
          <circle cx="208" cy="80" r="3" fill="#E4E9F5" />
        </g>
      </g>
      <!-- farol -->
      <circle cx="260" cy="52" r="3" fill="#8AF0FF" />
    </g>
  </g>

  <!-- Carro 2 - prateado -->
  <g transform="translate(440,22)">
    <ellipse cx="120" cy="80" rx="70" ry="7" fill="#000000" opacity="0.32" />
    <g>
      <path d="M10 52 L28 43 L50 43 L50 60 L28 60 Z" fill="#C4CBD6" />
      <path d="M50 47 L86 41 L112 43 L112 56 L80 60 L50 56 Z" fill="#D0D3E0" />
      <path d="M80 41 L160 39 L190 53 L250 53 L260 58 L250 63 L188 63 L160 76 L108 76 L80 65 Z"
            fill="url(#carSilver)" />
      <path d="M120 39 L148 39 L160 53 L122 53 Z" fill="#7FD8FF" />
      <rect x="135" y="37" width="8" height="16" rx="4" fill="#151924" />
      <path d="M224 41 L258 41 L266 52 L258 63 L224 63 Z" fill="#C4CBD6" />
      <rect x="108" y="61" width="32" height="5" rx="2.5" fill="#B8FFEB" opacity="0.9" />
      <rect x="174" y="50" width="26" height="4" rx="2" fill="#72F3C5" opacity="0.9" />
      <g>
        <g>
          <circle cx="92" cy="80" r="13" fill="#05070C" />
          <circle cx="92" cy="80" r="8" fill="#2A303C" />
          <circle cx="92" cy="80" r="3" fill="#E4E9F5" />
        </g>
        <g>
          <circle cx="208" cy="80" r="13" fill="#05070C" />
          <circle cx="208" cy="80" r="8" fill="#2A303C" />
          <circle cx="208" cy="80" r="3" fill="#E4E9F5" />
        </g>
      </g>
      <circle cx="260" cy="52" r="3" fill="#8AF0FF" />
    </g>
  </g>

  <!-- Carro 3 - azul/amarelo -->
  <g transform="translate(760,34)">
    <ellipse cx="120" cy="80" rx="70" ry="7" fill="#000000" opacity="0.3" />
    <g>
      <path d="M10 52 L28 43 L50 43 L50 60 L28 60 Z" fill="#202434" />
      <path d="M50 47 L86 41 L112 43 L112 56 L80 60 L50 56 Z" fill="#2B3778" />
      <path d="M80 41 L160 39 L190 53 L250 53 L260 58 L250 63 L188 63 L160 76 L108 76 L80 65 Z"
            fill="url(#carBlue)" />
      <path d="M120 39 L148 39 L160 53 L122 53 Z" fill="#7FD8FF" />
      <rect x="135" y="37" width="8" height="16" rx="4" fill="#151924" />
      <path d="M224 41 L258 41 L266 52 L258 63 L224 63 Z" fill="#202434" />
      <rect x="108" y="61" width="32" height="5" rx="2.5" fill="#FFCC00" opacity="0.95" />
      <rect x="174" y="50" width="26" height="4" rx="2" fill="#FFCC00" opacity="0.95" />
      <g>
        <g>
          <circle cx="92" cy="80" r="13" fill="#05070C" />
          <circle cx="92" cy="80" r="8" fill="#343A4C" />
          <circle cx="92" cy="80" r="3" fill="#E4E9F5" />
        </g>
        <g>
          <circle cx="208" cy="80" r="13" fill="#05070C" />
          <circle cx="208" cy="80" r="8" fill="#343A4C" />
          <circle cx="208" cy="80" r="3" fill="#E4E9F5" />
        </g>
      </g>
      <circle cx="260" cy="52" r="3" fill="#8AF0FF" />
    </g>
  </g>
</svg>